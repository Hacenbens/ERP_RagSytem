version: '3.8'

services:
  mongodb:
    image: mongo:7.0  # Latest stable version
    container_name: erp_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"  # Default MongoDB port
    environment:
      MONGO_INITDB_ROOT_USERNAME: hacen
      MONGO_INITDB_ROOT_PASSWORD: hacen123
      MONGO_INITDB_DATABASE: erp_rag_db
    volumes:
      - ./mongodb_data:/data/db  # Persist data
      - ./mongodb_config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro  # Initialization script
    networks:
      - erp_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s


networks:
  erp_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local